# Single source of truth for paths, match IDs, prompts, splits, and sponsor flags.
# No hardcoded paths/IDs anywhere else — read this via src.config.load_config().

# --- Paths (relative to repo root unless absolute) ---
paths:
  data_root: ./data          # SoccerTrack v2 root (gsr/, bas/, mot/, videos/, raw/)
  outputs: ./outputs         # saved videos / minimaps (gitignored)

# --- Dataset / SoccerTrack v2 ---
dataset:
  hf_repo_id: atomscott/soccertrack-v2   # canonical, but GATED — needs HF_TOKEN / hf auth login
  revision: main
  fps: 25
  # Official Google Drive mirror (per the dataset docs index.html). This exact
  # folder is shared with the owner's account → usable without HF gating.
  # NOTE: "mirrors may lag" — confirm it carries gsr/bas/mot, not just videos/.
  gdrive_mirror: "1N2Qx2qkFgRtpbHitl2Vh6sLVYGgqkWwn"
  source: drive        # hf | drive  — Drive mirror is link-public & complete, no HF gating

  # The ONE match we develop the demo on. 117093 exists in the mirror and is the
  # canonical example in the dataset docs → clean visuals for the demo.
  dev_match: "117093"

  # 80/10/10 split over the 10 matches ACTUALLY in the Drive mirror (verified by
  # listing it — the docs' assumed 117091–117100 / held-out 117099,117100 do NOT
  # match the real files). No documented held-out set in the mirror, so we define
  # our own deterministic holdout. Edit here, nowhere else.
  # Mirror has gsr+bas+raw+videos for all 10; note: NO mot/ → use GSR HOTA, not MOT HOTA.
  split:
    train: ["117092", "117093", "118575", "118576", "118577", "118578", "128057", "128058"]
    eval:  ["132831"]   # 10% — model selection / HOTA tuning
    test:  ["132877"]   # 10% — touched only for the final reported number

# --- Tracking backend selection (see src/model/) ---
# Factory reads this; ALL downstream code depends only on the SamBackend interface.
# Backends:
#   yolo   - Ultralytics YOLO + ByteTrack. UNGATED, free, runs on a Colab T4 in
#            seconds. The reliable default after SAM 3.1's gated weights + bleeding-
#            edge transformers proved too much friction for the deadline. (src/model/yolo_backend.py)
#   local  - SAM 3.1 self-hosted via HF Transformers. Gated (facebook/sam3) + needs
#            transformers from git main. Kept for if/when access clears. (src/model/sam_local.py)
#   api    - SAM 3.1 via fal.ai (no GPU, ~$0.01/16 frames, needs FAL_KEY). docs/DEFERRED.md.
#   replay - GSR ground-truth replay. No GPU/cost. Verified Phase 1; the safety net. (src/model/replay.py)
sam:
  backend: yolo         # yolo | local | api | replay
  yolo_weights: "yolo11n.pt"  # ungated COCO weights, auto-download (yolo11s/m = more accurate)
  conf: 0.25            # detection confidence threshold (yolo + sam_local)
  fal_model: "fal-ai/sam-3-1/video"   # used by sam_api.py when backend: api (deferred)
  hf_repo: "facebook/sam3"  # used by sam_local.py when backend: local — gated
  # Simple noun-phrase prompts (SAM 3.1) / mapped to COCO classes (yolo: person, sports ball).
  prompts:
    - "soccer player"
    - "goalkeeper"
    - "referee"
    - "sports ball"
  max_tracked: 64       # inference cost scales linearly with tracked objects

# --- Sponsor integrations (each off the critical path; flip to true to enable) ---
sponsors:
  sentry: false         # src/obs/  — error + perf monitoring, ID-swap alerts
  arize:  false         # src/obs/  — prediction logging + HOTA before/after
  redis:  false         # src/store/ — track-segment vectors + semantic search
  anthropic: false      # build/orchestration layer (meta)

# --- Difficulty / run knobs ---
run:
  clip_seconds: 10      # short clip length for fast Phase 1 iteration
  device: cuda          # cuda required for heavy runs; CPU only for smoke tests
