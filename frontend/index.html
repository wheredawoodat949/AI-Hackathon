<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Multi-sport tracking demo</title>
<style>
  body { background: #0b0f0d; color: #eee; font-family: -apple-system, sans-serif; margin: 0; padding: 2rem; }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .tab {
    background: #1a231e; color: #ccc; border: 1px solid #2e3a32; border-radius: 8px;
    padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.95rem;
  }
  .tab.active { background: #2e8b57; color: #fff; border-color: #2e8b57; }
  .label { font-size: 0.85rem; color: #9bb; margin-bottom: 0.5rem; }
  video { width: 100%; max-width: 960px; border-radius: 10px; background: #000; display: block; }
  .meta { font-size: 0.8rem; color: #789; margin-top: 0.5rem; }
</style>
</head>
<body>
  <h1>Tracking demo — pretrained detector + ByteTrack</h1>
  <div class="tabs">
    <button class="tab active" data-sport="basketball">🏀 Basketball</button>
    <button class="tab" data-sport="flag_football">🏈 Flag Football</button>
  </div>
  <div class="label" id="label">Basketball — player tracking</div>
  <video id="player" controls autoplay loop playsinline></video>
  <div class="meta" id="meta"></div>

  <script>
    const SOURCES = {
      basketball: {
        src: "../outputs/basketball_tracking_h264.mp4",
        label: "Basketball — player tracking (existing generated artifact: outputs/download.mp4 copy; raw-clip re-run pending)",
      },
      flag_football: {
        src: "../outputs/flag_football_tracking_h264.mp4",
        label: "Flag Football — YOLO11n + ByteTrack player tracking (USA vs Italy, The World Games, Birmingham AL)",
      },
    };

    const video = document.getElementById("player");
    const label = document.getElementById("label");
    const meta = document.getElementById("meta");
    const tabs = document.querySelectorAll(".tab");

    function select(sport) {
      const s = SOURCES[sport];
      video.src = s.src;
      label.textContent = s.label;
      tabs.forEach(t => t.classList.toggle("active", t.dataset.sport === sport));
      video.load();
      video.play().catch(() => {});
    }

    tabs.forEach(t => t.addEventListener("click", () => select(t.dataset.sport)));
    video.addEventListener("error", () => {
      meta.textContent = "Video failed to load — check that outputs/*.mp4 exist (run from repo root: python3 -m http.server 8000, then open http://localhost:8000/frontend/).";
    });

    select("basketball");
  </script>
</body>
</html>
